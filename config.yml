# wenshucha-seo 站点 + URL 配置
# 这里集中维护"哪些站、哪些 URL 要被搜索引擎收录"

global:
  # IndexNow key(8-128 chars,只能 a-z A-Z 0-9 -)
  # 同一个 key 在所有 host 根目录的 {key}.txt 中,内容就是 key 本身
  indexnow_key: "a8f3b9c2d1e5f7a8b9c0d1e2f3a4b5c6"
  ssl_warn_days: 30          # SSL < 30 天告警
  ssl_critical_days: 14      # SSL < 14 天紧急告警
  # 百度普通收录推送 token(主战场是国内,百度优先)
  # 来源: ziyuan.baidu.com → 普通收录 → API提交 → token
  baidu_push_token: "0mLhyBqtuRt6o6fa"

sites:

  - name: wenshucha-main
    host: wenshucha.com
    sitemap: https://wenshucha.com/sitemap.xml
    urls_to_push:
      - https://wenshucha.com/
      - https://wenshucha.com/blog/
      - https://wenshucha.com/blog/law-firm-private-ai-deployment-guide.html
      - https://wenshucha.com/blog/court-ai-procurement-checklist.html
      - https://wenshucha.com/blog/law-firm-ai-roi-calculation.html
      - https://wenshucha.com/blog/judicial-data-platform-construction.html
      - https://wenshucha.com/#workbench
      - https://wenshucha.com/#api-pricing
      - https://wenshucha.com/#api
      - https://wenshucha.com/#solution
      - https://wenshucha.com/#types
      - https://wenshucha.com/#faq
      - https://wenshucha.com/#about
      - https://www.wenshucha.com/data/labor/
    check_ssl: true

  - name: sinoverdict-en
    host: sinoverdict.wenshucha.com
    sitemap: https://sinoverdict.wenshucha.com/sitemap.xml
    urls_to_push:
      - https://sinoverdict.wenshucha.com/
      - https://sinoverdict.wenshucha.com/#how
      - https://sinoverdict.wenshucha.com/#access
      - https://sinoverdict.wenshucha.com/#faq
      - https://sinoverdict.wenshucha.com/blog/
      - https://sinoverdict.wenshucha.com/blog/licensing-chinese-court-data-guide.html
      - https://sinoverdict.wenshucha.com/blog/chinese-case-law-api-structure.html
      - https://sinoverdict.wenshucha.com/blog/state-of-chinese-case-law-data-2026.html
    check_ssl: true

  - name: mcp-zh-dev
    host: mcp.wenshucha.com
    sitemap: https://mcp.wenshucha.com/sitemap.xml
    urls_to_push:
      - https://mcp.wenshucha.com/
    check_ssl: true

  # ========== peilema · To C 劳动仲裁计算 9.9 元报告 ==========
  - name: peilema-c
    host: peilema.wenshucha.com
    sitemap: https://peilema.wenshucha.com/sitemap.xml
    urls_to_push:
      - https://peilema.wenshucha.com/
      - https://peilema.wenshucha.com/calc
      - https://peilema.wenshucha.com/sample
      - https://peilema.wenshucha.com/service
      - https://peilema.wenshucha.com/xhs
    check_ssl: true

# 关键词地图(给 check_indexed / weekly report / 内容生产用)
# 三个站三套目标,见 memory/project_three_sites_target_customer.md
keywords:

  # --- wenshucha.com (To B · 大律所 + 地方政府,卖私有化离线 AI) ---
  wenshucha_tob:
    high_intent:
      - "律所私有 AI 部署"
      - "司法大数据本地化"
      - "法律 AI 私有化"
      - "政府司法 AI 解决方案"
      - "裁判文书数据私有部署"
      - "法院信息中心 AI"
      - "数字法治政府方案"
    long_tail:
      - "律所本地化大模型"
      - "法院 AI 智能审判辅助"
      - "司法机关数据中台"
      - "法律 LLM 内网部署"
      - "类案推送系统"
      - "1.5亿裁判文书私有库"

  # --- sinoverdict (To B 海外 · AI 法律大公司,卖数据 license) ---
  sinoverdict_enterprise:
    high_intent:
      - "Chinese legal data licensing"
      - "China case law database for AI vendors"
      - "Chinese court judgments enterprise API"
      - "Chinese legal corpus for LLM training"
      - "bulk Chinese case law access"
    long_tail:
      - "Chinese legal data for AI vendors"
      - "license Chinese case law to AI companies"
      - "enterprise data partner Chinese law"
      - "PRC court data for AI"
      - "Chinese case law dataset enterprise"

  # --- peilema (To C · 被裁员劳动者,卖 9.9 元仲裁报告) ---
  peilema_c:
    high_intent:           # 高搜索量 + 高商业意图
      - "N+1 计算器"
      - "裁员赔偿计算器"
      - "劳动仲裁赔偿"
      - "违法解雇赔偿标准"
      - "2N 赔偿"
      - "经济补偿金计算"
      - "辞退赔偿标准"
    emotional_long_tail:   # 高情绪用户场景词
      - "被裁员了能拿多少赔偿"
      - "公司违法解雇怎么算"
      - "N+1 还是 2N"
      - "公司不发工资怎么办"
      - "申请劳动仲裁多久能拿到钱"
      - "劳动仲裁需要请律师吗"
      - "裁员赔偿不到位怎么办"
      - "被辞退没签合同怎么办"
    persona:               # 用户身份情境词
      - "互联网裁员赔偿"
      - "35 岁被优化赔偿"
      - "孕期被辞退赔偿"
      - "怀孕期间被裁员"
      - "试用期被辞退"
      - "工作 10 年被裁赔偿"
      - "N+3 是什么意思"
